# VM nginx config — place in /etc/nginx/sites-available/guide_bookshop
# then: sudo ln -s /etc/nginx/sites-available/guide_bookshop /etc/nginx/sites-enabled/
#
# Replace /path/to/guide_bookshop with the actual project directory on your VM.

server {
    listen 80;
    server_name yourdomain.com;          # <-- change to your domain or IP
    client_max_body_size 20M;

    # Static files (populated by collectstatic inside the container via bind mount)
    location /static/ {
        alias /path/to/guide_bookshop/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (user uploads, persisted via bind mount)
    location /media/ {
        alias /path/to/guide_bookshop/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy everything else to Gunicorn in the container
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
