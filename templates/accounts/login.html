<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - Guide Bookshop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16'}}}}}</script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .login-bg {
      background: linear-gradient(135deg, #052e16 0%, #0f3d1f 30%, #14532d 60%, #15803d 85%, #16a34a 100%);
    }
    .input-field {
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
      outline: none;
    }
    .login-card {
      box-shadow: 0 25px 60px rgba(0,0,0,0.25), 0 8px 20px rgba(0,0,0,0.1);
    }
    .dot-pattern {
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="min-h-screen login-bg dot-pattern flex items-center justify-center p-4">

  <!-- Background decorations -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -right-32 w-96 h-96 rounded-full opacity-10" style="background:radial-gradient(circle,#4ade80,transparent)"></div>
    <div class="absolute -bottom-32 -left-32 w-80 h-80 rounded-full opacity-8" style="background:radial-gradient(circle,#22c55e,transparent)"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full opacity-5 border border-green-400"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] rounded-full opacity-3 border border-green-500"></div>
  </div>

  <div class="w-full max-w-md relative z-10">

    <!-- Logo header -->
    <div class="text-center mb-8">
      <div class="inline-flex w-20 h-20 rounded-2xl items-center justify-center mb-5 shadow-xl"
           style="background:linear-gradient(135deg,#22c55e,#14532d)">
        <i class="fas fa-book-open text-white text-3xl"></i>
      </div>
      <h1 style="font-family:'Playfair Display',serif" class="text-3xl font-bold text-primary tracking-tight">Guide Bookshop</h1>
      <div class="flex items-center justify-center gap-2 mt-2">
        <div class="h-px w-12 bg-green-500 opacity-60"></div>
        <p class="text-primary-300 text-sm font-medium tracking-widest uppercase">Staff Portal</p>
        <div class="h-px w-12 bg-green-500 opacity-60"></div>
      </div>
    </div>

    <!-- Login Card -->
    <div class="login-card bg-white rounded-3xl overflow-hidden">

      <!-- Card top accent -->
      <div class="h-1.5" style="background:linear-gradient(90deg,#052e16,#16a34a,#4ade80,#16a34a,#052e16)"></div>

      <div class="p-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-1">Welcome back</h2>
        <p class="text-gray-500 text-sm mb-7">Sign in to your staff account to continue</p>

        {% if messages %}
        {% for message in messages %}
        <div class="flex items-center gap-3 bg-red-50 text-red-700 border border-red-200 rounded-xl p-3.5 mb-5 text-sm">
          <div class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center flex-shrink-0">
            <i class="fas fa-circle-exclamation text-red-500 text-xs"></i>
          </div>
          <span>{{ message }}</span>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" class="space-y-5">
          {% csrf_token %}

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
            <div class="relative">
              <div class="absolute left-3.5 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center">
                <i class="fas fa-user text-primary-400 text-sm"></i>
              </div>
              <input type="text" name="username" required autofocus
                     class="input-field w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl text-sm bg-gray-50"
                     placeholder="Enter your username">
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
            <div class="relative">
              <div class="absolute left-3.5 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center">
                <i class="fas fa-lock text-primary-400 text-sm"></i>
              </div>
              <input type="password" name="password" id="pwd" required
                     class="input-field w-full pl-12 pr-12 py-3 border border-gray-200 rounded-xl text-sm bg-gray-50"
                     placeholder="Enter your password">
              <button type="button" onclick="togglePwd()"
                      class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-gray-400 hover:text-primary-600 transition-colors rounded-lg hover:bg-primary-50">
                <i class="fas fa-eye text-sm" id="eye-icon"></i>
              </button>
            </div>
          </div>

          <button type="submit"
                  class="w-full text-white py-3.5 rounded-xl font-semibold text-sm transition-all hover:-translate-y-0.5"
                  style="background:linear-gradient(135deg,#16a34a,#14532d);box-shadow:0 4px 15px rgba(22,163,74,0.35)">
            <i class="fas fa-sign-in-alt mr-2"></i>Sign In to Dashboard
          </button>
        </form>

        <div class="mt-7 pt-5 border-t border-gray-100 text-center">
          <a href="{% url 'landing' %}" class="inline-flex items-center gap-2 text-primary-600 text-sm hover:text-primary-800 font-medium transition-colors group">
            <i class="fas fa-arrow-left text-xs group-hover:-translate-x-1 transition-transform"></i>
            Back to Store
          </a>
        </div>
      </div>
    </div>

    <p class="text-center text-primary-400 text-xs mt-6">
      &copy; {% now "Y" %} Guide Bookshop & Stationeries
    </p>
  </div>

  <script>
  function togglePwd() {
    const p = document.getElementById('pwd');
    const i = document.getElementById('eye-icon');
    p.type = p.type === 'password' ? 'text' : 'password';
    i.className = p.type === 'password' ? 'fas fa-eye text-sm' : 'fas fa-eye-slash text-sm';
  }
  </script>
</body>
</html>
